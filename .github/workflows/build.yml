name: Build & Release Multi-Platform (Android, Windows, macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==========================================
  # ۱. بیلد اندروید (Android Build)
  # ==========================================
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Initialize Project & Inject Code
        run: |
          flutter create . --org com.example.tgwsproxy --project-name tg_ws_proxy --platforms android
          
          # دسترسی اینترنت اندروید
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/><application/' android/app/src/main/AndroidManifest.xml

          # ایجاد نیازمندی‌ها
          cat <<'YAML' > pubspec.yaml
          name: tg_ws_proxy
          description: SOCKS5 Proxy Manager for Telegram via Cloudflare Workers
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.2.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            provider: ^6.1.2
            web_socket_channel: ^2.4.5
            url_launcher: ^6.3.0
            uuid: ^4.4.2
            shared_preferences: ^2.3.2
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          YAML

          mkdir -p lib/{models,services,providers,screens,widgets}

          # ---------------- تزریق کدهای دارت ----------------
          cat <<'DART' > lib/models/worker.dart
          class Worker { final String id; String url; int requestCount; final int maxRequests; int pingLatency; bool isOnline; Worker({required this.id, required this.url, this.requestCount = 0, this.maxRequests = 100000, this.pingLatency = -1, this.isOnline = false}); factory Worker.fromJson(Map<String, dynamic> json) => Worker(id: json['id'], url: json['url'], requestCount: json['requestCount'] ?? 0, maxRequests: json['maxRequests'] ?? 100000, pingLatency: json['pingLatency'] ?? -1, isOnline: json['isOnline'] ?? false); Map<String, dynamic> toJson() => {'id': id, 'url': url, 'requestCount': requestCount, 'maxRequests': maxRequests, 'pingLatency': pingLatency, 'isOnline': isOnline}; }
          DART

          cat <<'DART' > lib/services/clipboard_service.dart
          import 'package:flutter/services.dart'; class ClipboardService { Future<String?> getClipboardData() async => (await Clipboard.getData('text/plain'))?.text; Future<void> setClipboardData(String text) async => Clipboard.setData(ClipboardData(text: text)); }
          DART

          cat <<'DART' > lib/services/ping_service.dart
          import 'dart:async'; import 'dart:io'; class PingService { Future<int> ping(String url) async { try { final uri = Uri.parse(url); final host = uri.host; final port = uri.scheme == 'https' ? 443 : (uri.port != 0 ? uri.port : 80); final sw = Stopwatch()..start(); final socket = await Socket.connect(host, port, timeout: const Duration(seconds: 4)); socket.destroy(); sw.stop(); return sw.elapsedMilliseconds; } catch (_) { return -1; } } }
          DART

          cat <<'DART' > lib/services/telegram_service.dart
          import 'package:url_launcher/url_launcher.dart'; class TelegramService { Future<bool> openTelegramProxySettings({required String server, required int port}) async { final uri = Uri.parse('tg://socks?server=$server&port=$port'); if (await canLaunchUrl(uri)) return launchUrl(uri, mode: LaunchMode.externalApplication); return false; } }
          DART

          cat <<'DART' > lib/services/socks5_proxy_server.dart
          import 'dart:async'; import 'dart:io'; import 'dart:typed_data'; import 'package:web_socket_channel/web_socket_channel.dart'; import '../models/worker.dart';
          class Socks5ProxyServer { ServerSocket? _server; bool _isRunning = false; String _status = 'Stopped'; int _activeConnections = 0; String _bindHost = '127.0.0.1'; int _bindPort = 1080; bool enableLogging = false; final StreamController<String> _statusController = StreamController<String>.broadcast(); final StreamController<int> _connectionsController = StreamController<int>.broadcast(); final StreamController<String> _debugLogController = StreamController<String>.broadcast(); final List<Worker> _workers = []; Worker? _activeWorker; final List<StreamSubscription> _connectionSubscriptions = []; void Function(String logMsg)? onDebugLog; void Function(Worker worker)? onConnectionRelayed; bool get isRunning => _isRunning; String get status => _status; String get bindHost => _bindHost; int get bindPort => _bindPort; Stream<String> get statusStream => _statusController.stream; Stream<int> get connectionsStream => _connectionsController.stream; Stream<String> get debugLogStream => _debugLogController.stream; void setBindAddress(String host, int port) { _bindHost = host; _bindPort = port; } void setWorkers(List<Worker> workers) { _workers.clear(); _workers.addAll(workers); } void setActiveWorker(Worker? worker) { _activeWorker = worker; } void _debug(String msg) { if (!enableLogging) return; final formattedMsg = '[SOCKS5] $msg'; _debugLogController.add(formattedMsg); onDebugLog?.call(formattedMsg); } Future<void> start() async { if (_isRunning) return; if (_activeWorker == null && _workers.isNotEmpty) { _activeWorker = _workers.first; } if (_activeWorker == null) { _updateStatus('No active worker configured'); return; } try { _server = await ServerSocket.bind(_bindHost, _bindPort); _isRunning = true; _updateStatus('Running (SOCKS5)'); _debug('Server started on $_bindHost:$_bindPort'); _server!.listen(_handleConnection); } catch (e) { _updateStatus('Error: $e'); _debug('Failed to start server: $e'); } } Future<void> stop() async { if (!_isRunning) return; _isRunning = false; await _server?.close(); _server = null; _activeConnections = 0; _connectionsController.add(0); for (final sub in _connectionSubscriptions) { sub.cancel(); } _connectionSubscriptions.clear(); _debug('Server stopped'); _updateStatus('Stopped'); } void _handleConnection(Socket clientSocket) async { _activeConnections++; _connectionsController.add(_activeConnections); try { final dataController = StreamController<Uint8List>(); final buffer = <int>[]; final sub = clientSocket.listen((data) { buffer.addAll(data); dataController.add(data); }, onError: (e) { if (!dataController.isClosed) dataController.addError(e); }, onDone: () { if (!dataController.isClosed) dataController.close(); }); Future<Uint8List> readBytes(int n) async { while (buffer.length < n) { await dataController.stream.first; } final result = Uint8List.fromList(buffer.sublist(0, n)); buffer.removeRange(0, n); return result; } final greeting = await readBytes(2); if (greeting[0] != 0x05) { _debug('Invalid SOCKS5'); await sub.cancel(); clientSocket.destroy(); return; } final nmethods = greeting[1]; await readBytes(nmethods); clientSocket.add(Uint8List.fromList([0x05, 0x00])); final reqHeader = await readBytes(4); if (reqHeader[0] != 0x05 || reqHeader[1] != 0x01) { await sub.cancel(); clientSocket.destroy(); return; } final addrType = reqHeader[3]; Uint8List targetAddr; if (addrType == 0x01) { targetAddr = await readBytes(6); } else if (addrType == 0x03) { final lenBuf = await readBytes(1); final domainLen = lenBuf[0]; final domain = await readBytes(domainLen); final port = await readBytes(2); targetAddr = Uint8List.fromList([addrType, domainLen, ...domain, ...port]); } else if (addrType == 0x04) { targetAddr = await readBytes(18); } else { await sub.cancel(); clientSocket.destroy(); return; } _debug('Tunnel Request Received'); String workerUrl = _activeWorker!.url; if (workerUrl.startsWith('https://')) { workerUrl = workerUrl.replaceFirst('https://', 'wss://'); } else if (workerUrl.startsWith('http://')) { workerUrl = workerUrl.replaceFirst('http://', 'ws://'); } sub.pause(); final wsChannel = WebSocketChannel.connect(Uri.parse(workerUrl)); await wsChannel.ready.timeout(const Duration(seconds: 10)); _debug('WebSocket tunnel established'); clientSocket.add(Uint8List.fromList([0x05, 0x00, 0x00, ...targetAddr])); sub.resume(); final wsSink = wsChannel.sink; final wsStream = wsChannel.stream; sub.onData((data) => wsSink.add(data)); sub.onDone(() => wsSink.close()); sub.onError((_) => wsSink.close()); final wsToSocket = wsStream.listen((data) { try { clientSocket.add(data); } catch (_) {} }, onDone: () => clientSocket.destroy(), onError: (_) => clientSocket.destroy(), cancelOnError: true); _connectionSubscriptions.add(sub); _connectionSubscriptions.add(wsToSocket); if (_activeWorker != null) { _activeWorker!.requestCount++; onConnectionRelayed?.call(_activeWorker!); } await Future.any([sub.asFuture<void>(), wsToSocket.asFuture<void>()]); } catch (e) { _debug('Tunnel error: $e'); try { clientSocket.add(Uint8List.fromList([0x05, 0x01, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00])); } catch (_) {} } finally { _activeConnections--; _connectionsController.add(_activeConnections); try { clientSocket.destroy(); } catch (_) {} } } void _updateStatus(String status) { _status = status; _statusController.add(status); } void dispose() { _statusController.close(); _connectionsController.close(); _debugLogController.close(); } }
          DART

          cat <<'DART' > lib/providers/app_state.dart
          import 'dart:convert'; import 'package:flutter/foundation.dart'; import 'package:shared_preferences/shared_preferences.dart'; import 'package:uuid/uuid.dart'; import '../models/worker.dart'; import '../services/clipboard_service.dart'; import '../services/socks5_proxy_server.dart'; import '../services/telegram_service.dart'; import '../services/ping_service.dart';
          class AppState extends ChangeNotifier { final Socks5ProxyServer proxyServer; final ClipboardService clipboardService; final TelegramService telegramService; final PingService pingService; List<Worker> _workers = []; Worker? _selectedWorker; bool _proxyRunning = false; String _proxyStatus = 'Stopped'; final List<String> _logs = []; int _activeConnections = 0; bool _autoSwitch = false; late SharedPreferences _prefs; final List<String> _defaultFlowsealDomains = ['https://bp.flowseal.site', 'https://cfproxy.flowseal.workers.dev', 'https://skk.flowseal.site', 'https://warp.flowseal.site', 'https://free.flowseal.workers.dev']; AppState({required this.proxyServer, required this.clipboardService, required this.telegramService, required this.pingService}) { proxyServer.statusStream.listen((status) { _proxyStatus = status; _proxyRunning = proxyServer.isRunning; if (status.startsWith('Error')) _addLog('Error: $status'); notifyListeners(); }); proxyServer.connectionsStream.listen((count) { _activeConnections = count; notifyListeners(); }); proxyServer.debugLogStream.listen((msg) => _addLog(msg)); proxyServer.onDebugLog = (msg) => _addLog(msg); proxyServer.onConnectionRelayed = (worker) { if (_autoSwitch && worker == _selectedWorker && worker.requestCount >= worker.maxRequests) { _switchToNextWorker(); } notifyListeners(); }; _initPrefs(); } List<Worker> get workers => _workers; Worker? get selectedWorker => _selectedWorker; bool get proxyRunning => _proxyRunning; String get proxyStatus => _proxyStatus; List<String> get logs => _logs; int get activeConnections => _activeConnections; bool get autoSwitch => _autoSwitch; bool get enableLogging => proxyServer.enableLogging; String get bindHost => proxyServer.bindHost; int get bindPort => proxyServer.bindPort; Future<void> _initPrefs() async { _prefs = await SharedPreferences.getInstance(); _loadSettings(); _loadWorkers(); notifyListeners(); pingAll(); } void _loadSettings() { proxyServer.setBindAddress(_prefs.getString('bindHost') ?? '127.0.0.1', _prefs.getInt('bindPort') ?? 1080); _autoSwitch = _prefs.getBool('autoSwitch') ?? false; proxyServer.enableLogging = _prefs.getBool('enableLogging') ?? false; } void _loadWorkers() { final jsonString = _prefs.getString('workers'); if (jsonString != null && jsonString.isNotEmpty) { _workers = (json.decode(jsonString) as List).map((e) => Worker.fromJson(e)).toList(); } else { for (var url in _defaultFlowsealDomains) { _workers.add(Worker(id: const Uuid().v4(), url: url)); } _saveWorkers(); } final selectedId = _prefs.getString('selectedWorkerId'); _selectedWorker = _workers.firstWhere((w) => w.id == selectedId, orElse: () => _workers.isNotEmpty ? _workers.first : null); } Future<void> _saveWorkers() async { await _prefs.setString('workers', json.encode(_workers.map((w) => w.toJson()).toList())); if (_selectedWorker != null) await _prefs.setString('selectedWorkerId', _selectedWorker!.id); } void setBindAddress(String host, int port) { proxyServer.setBindAddress(host, port); _prefs.setString('bindHost', host); _prefs.setInt('bindPort', port); _addLog('Bind address changed to $host:$port'); notifyListeners(); } Future<void> setAutoSwitch(bool value) async { _autoSwitch = value; await _prefs.setBool('autoSwitch', value); notifyListeners(); } Future<void> setLoggingEnabled(bool value) async { proxyServer.enableLogging = value; await _prefs.setBool('enableLogging', value); if (!value) _logs.clear(); notifyListeners(); } Future<void> importWorkerFromClipboard() async { final text = await clipboardService.getClipboardData(); if (text != null && text.isNotEmpty) { final worker = Worker(id: const Uuid().v4(), url: text.trim()); _workers.add(worker); await _saveWorkers(); notifyListeners(); final latency = await pingService.ping(worker.url); worker.pingLatency = latency; worker.isOnline = latency != -1; await _saveWorkers(); notifyListeners(); } } void selectWorker(Worker w) { _selectedWorker = w; _saveWorkers(); notifyListeners(); } Future<void> removeWorker(Worker w) async { _workers.remove(w); if (_selectedWorker == w) { _selectedWorker = _workers.isNotEmpty ? _workers.first : null; } await _saveWorkers(); notifyListeners(); } Future<void> copyWorkerUrl(Worker w) async => await clipboardService.setClipboardData(w.url); Future<void> copyAllWorkers() async { if (_workers.isNotEmpty) await clipboardService.setClipboardData(_workers.map((w) => w.url).join('\n')); } Future<void> copyLogs() async { if (_logs.isNotEmpty) await clipboardService.setClipboardData(_logs.join('\n')); } Future<void> pingAll() async { for (var w in _workers) { final lat = await pingService.ping(w.url); w.pingLatency = lat; w.isOnline = lat != -1; } await _saveWorkers(); notifyListeners(); } Future<void> toggleProxy() async { if (_proxyRunning) { await proxyServer.stop(); } else { proxyServer.setWorkers(_workers); proxyServer.setActiveWorker(_selectedWorker); await proxyServer.start(); } notifyListeners(); } Future<void> openInTelegram() async => await telegramService.openTelegramProxySettings(server: bindHost, port: bindPort); void clearLogs() { _logs.clear(); notifyListeners(); } void _addLog(String msg) { if (!proxyServer.enableLogging) return; _logs.add('[${DateTime.now().toIso8601String().substring(11, 19)}] $msg'); if (_logs.length > 100) _logs.removeAt(0); notifyListeners(); } void _switchToNextWorker() { if (_workers.length < 2) return; final online = _workers.where((w) => w.isOnline).toList(); if (online.isEmpty) return; _selectedWorker = online[(online.indexOf(_selectedWorker!) + 1) % online.length]; proxyServer.setActiveWorker(_selectedWorker); _saveWorkers(); notifyListeners(); } @override void dispose() { proxyServer.dispose(); super.dispose(); } }
          DART

          cat <<'DART' > lib/screens/home_screen.dart
          import 'package:flutter/material.dart'; import 'package:provider/provider.dart'; import '../providers/app_state.dart'; import '../widgets/worker_tile.dart'; import '../widgets/bottom_status_bar.dart'; import 'log_screen.dart';
          class HomeScreen extends StatefulWidget { const HomeScreen({super.key}); @override State<HomeScreen> createState() => _HomeScreenState(); }
          class _HomeScreenState extends State<HomeScreen> { void _showSettings(BuildContext context) { final app = context.read<AppState>(); final hostCtrl = TextEditingController(text: app.bindHost); final portCtrl = TextEditingController(text: app.bindPort.toString()); bool autoSwitch = app.autoSwitch; bool enableLogging = app.enableLogging; showDialog(context: context, builder: (ctx) => StatefulBuilder(builder: (ctx, setState) => AlertDialog( title: const Text('Settings'), content: Column(mainAxisSize: MainAxisSize.min, children: [ TextField(controller: hostCtrl, decoration: const InputDecoration(labelText: 'Bind IP')), TextField(controller: portCtrl, decoration: const InputDecoration(labelText: 'Bind Port'), keyboardType: TextInputType.number), SwitchListTile(title: const Text('Auto-switch on limit'), value: autoSwitch, onChanged: (val) => setState(() => autoSwitch = val)), SwitchListTile(title: const Text('Enable Debug Logs'), subtitle: const Text('Manually record traffic'), value: enableLogging, onChanged: (val) => setState(() => enableLogging = val)), ]), actions: [ TextButton(onPressed: () => Navigator.pop(ctx), child: const Text('Cancel')), TextButton(onPressed: () { final port = int.tryParse(portCtrl.text.trim()); if (hostCtrl.text.isNotEmpty && port != null) app.setBindAddress(hostCtrl.text.trim(), port); app.setAutoSwitch(autoSwitch); app.setLoggingEnabled(enableLogging); Navigator.pop(ctx); }, child: const Text('Save')), ], ))); } @override Widget build(BuildContext context) { final app = context.watch<AppState>(); return Scaffold( appBar: AppBar(title: const Text('TG WS Proxy'), centerTitle: true, actions: [ PopupMenuButton<String>(icon: const Icon(Icons.more_vert), onSelected: (value) { switch (value) { case 'import': app.importWorkerFromClipboard(); break; case 'copy_all': app.copyAllWorkers(); break; case 'ping_all': app.pingAll(); break; case 'logs': Navigator.push(context, MaterialPageRoute(builder: (_) => const LogScreen())); break; case 'settings': _showSettings(context); break; } }, itemBuilder: (context) => [ const PopupMenuItem(value: 'import', child: ListTile(leading: Icon(Icons.content_paste), title: Text('Import from clipboard'))), const PopupMenuItem(value: 'copy_all', child: ListTile(leading: Icon(Icons.copy_all), title: Text('Copy all workers'))), const PopupMenuItem(value: 'ping_all', child: ListTile(leading: Icon(Icons.speed), title: Text('Ping all'))), const PopupMenuItem(value: 'logs', child: ListTile(leading: Icon(Icons.terminal), title: Text('Console Logs'))), const PopupMenuItem(value: 'settings', child: ListTile(leading: Icon(Icons.settings), title: Text('Settings'))), ]), ]), body: Column(children: [ Padding(padding: const EdgeInsets.all(16), child: SizedBox(width: double.infinity, child: ElevatedButton.icon( onPressed: app.proxyRunning ? () => app.openInTelegram() : null, icon: const Icon(Icons.send), label: const Text('Import Proxy to Telegram'), style: ElevatedButton.styleFrom(padding: const EdgeInsets.symmetric(vertical: 16)), ))), Expanded(child: ListView.builder(itemCount: app.workers.length, itemBuilder: (_, i) { final w = app.workers[i]; return WorkerTile(worker: w, isSelected: app.selectedWorker == w, onTap: () => app.selectWorker(w), onRemove: () => app.removeWorker(w), onCopy: () => app.copyWorkerUrl(w)); })), ]), bottomNavigationBar: BottomStatusBar(status: app.proxyStatus, isRunning: app.proxyRunning, activeConnections: app.activeConnections, onToggle: app.toggleProxy), ); } }
          DART

          cat <<'DART' > lib/screens/log_screen.dart
          import 'package:flutter/material.dart'; import 'package:provider/provider.dart'; import '../providers/app_state.dart';
          class LogScreen extends StatelessWidget { const LogScreen({super.key}); @override Widget build(BuildContext context) { final app = context.watch<AppState>(); return Scaffold( appBar: AppBar(title: const Text('Logs'), actions: [ if (app.enableLogging) ...[ IconButton(icon: const Icon(Icons.copy), onPressed: () => app.copyLogs(), tooltip: 'Copy logs'), IconButton(icon: const Icon(Icons.cleaning_services), onPressed: () => app.clearLogs(), tooltip: 'Clear Logs'), ] ]), body: !app.enableLogging ? const Center(child: Padding(padding: EdgeInsets.all(24), child: Text('Logging is disabled.\nEnable "Debug Logs" in Settings to view activity.', textAlign: TextAlign.center))) : app.logs.isEmpty ? const Center(child: Text('Console is empty')) : ListView.builder(itemCount: app.logs.length, itemBuilder: (_, i) => Padding( padding: const EdgeInsets.symmetric(horizontal: 14, vertical: 2), child: Text(app.logs[i], style: const TextStyle(fontSize: 11, fontFamily: 'monospace')), )), ); } }
          DART

          cat <<'DART' > lib/widgets/worker_tile.dart
          import 'package:flutter/material.dart'; import '../models/worker.dart';
          class WorkerTile extends StatelessWidget { final Worker worker; final bool isSelected; final VoidCallback onTap; final VoidCallback onRemove; final VoidCallback onCopy; const WorkerTile({super.key, required this.worker, required this.isSelected, required this.onTap, required this.onRemove, required this.onCopy}); @override Widget build(BuildContext context) { return Card(color: isSelected ? Theme.of(context).colorScheme.primaryContainer : null, margin: const EdgeInsets.symmetric(horizontal: 16, vertical: 6), child: ListTile( onTap: onTap, leading: Icon(worker.isOnline ? Icons.bolt : Icons.cloud_queue, color: worker.isOnline ? Colors.green : Colors.grey), title: Text(worker.url, maxLines: 1, overflow: TextOverflow.ellipsis, style: TextStyle(fontWeight: isSelected ? FontWeight.bold : FontWeight.normal)), subtitle: Text(worker.isOnline ? 'Ping: ${worker.pingLatency}ms | Relayed: ${worker.requestCount}' : 'No Connection / Untested', style: const TextStyle(fontSize: 12)), trailing: Row(mainAxisSize: MainAxisSize.min, children: [IconButton(icon: const Icon(Icons.copy, size: 18), onPressed: onCopy), IconButton(icon: const Icon(Icons.delete, size: 18, color: Colors.red), onPressed: onRemove)]), )); } }
          DART

          cat <<'DART' > lib/widgets/bottom_status_bar.dart
          import 'package:flutter/material.dart';
          class BottomStatusBar extends StatelessWidget { final String status; final bool isRunning; final int activeConnections; final VoidCallback onToggle; const BottomStatusBar({super.key, required this.status, required this.isRunning, required this.activeConnections, required this.onToggle}); @override Widget build(BuildContext context) { return Container(padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 12), decoration: BoxDecoration(color: Theme.of(context).colorScheme.surfaceContainerHighest, border: Border(top: BorderSide(color: Theme.of(context).dividerColor))), child: SafeArea(child: Row(children: [ Expanded(child: Column(mainAxisSize: MainAxisSize.min, crossAxisAlignment: CrossAxisAlignment.start, children: [ Row(children: [Container(width: 10, height: 10, decoration: BoxDecoration(shape: BoxShape.circle, color: isRunning ? Colors.green : Colors.red)), const SizedBox(width: 8), Text(status, style: const TextStyle(fontWeight: FontWeight.bold))]), const SizedBox(height: 4), Text('Active Sessions: $activeConnections', style: const TextStyle(fontSize: 12)), ])), ElevatedButton.icon(onPressed: onToggle, icon: Icon(isRunning ? Icons.stop : Icons.play_arrow), label: Text(isRunning ? 'Stop' : 'Start'), style: ElevatedButton.styleFrom(backgroundColor: isRunning ? Colors.red.shade100 : Colors.green.shade100, foregroundColor: isRunning ? Colors.red.shade900 : Colors.green.shade900)), ]))); } }
          DART

          # ⚠️ رفع باگ ThemeData در main.dart
          cat <<'DART' > lib/main.dart
          import 'package:flutter/material.dart'; import 'package:provider/provider.dart'; import 'providers/app_state.dart'; import 'services/socks5_proxy_server.dart'; import 'services/clipboard_service.dart'; import 'services/telegram_service.dart'; import 'services/ping_service.dart'; import 'screens/home_screen.dart';
          void main() { WidgetsFlutterBinding.ensureInitialized(); runApp(ChangeNotifierProvider(create: (_) => AppState(proxyServer: Socks5ProxyServer(), clipboardService: ClipboardService(), telegramService: TelegramService(), pingService: PingService()), child: const MyApp())); }
          class MyApp extends StatelessWidget { const MyApp({super.key}); @override Widget build(BuildContext context) { return MaterialApp(title: 'TG WS Proxy', debugShowCheckedModeBanner: false, theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue, brightness: Brightness.light), useMaterial3: true), darkTheme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue, brightness: Brightness.dark), useMaterial3: true), themeMode: ThemeMode.system, home: const HomeScreen()); } }
          DART

          # آپلود موقت کدها برای استفاده در بیلد ویندوز و مک (برای جلوگیری از تکرار کد در فایل YAML)
          tar -cvf shared_source.tar lib/ pubspec.yaml

      - name: Share Source Code
        uses: actions/upload-artifact@v4
        with:
          name: shared_source
          path: shared_source.tar

      - name: Build Android Deliverables
        run: |
          flutter build apk --release
          flutter build apk --release --split-per-abi
          flutter build appbundle --release

          mkdir -p release-android
          cp build/app/outputs/flutter-apk/app-release.apk release-android/tg_ws_proxy_android_universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-android/tg_ws_proxy_android_armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-android/tg_ws_proxy_android_arm64-v8a.apk
          cp build/app/outputs/bundle/release/app-release.aab release-android/tg_ws_proxy_android.aab

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: release-android/*


  # ==========================================
  # ۲. بیلد ویندوز (Windows Build)
  # ==========================================
  build-windows:
    name: Build Windows App
    needs: build-android
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Windows Environment
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          flutter create . --org com.example.tgwsproxy --project-name tg_ws_proxy --platforms windows

      - name: Download Shared Source Code
        uses: actions/download-artifact@v4
        with:
          name: shared_source
          path: .

      - name: Extract Source and Build
        shell: bash
        run: |
          tar -xvf shared_source.tar
          flutter pub get
          flutter build windows --release
          
          mkdir -p release-windows
          # استفاده از 7z برای فشرده‌سازی در محیط ویندوز
          7z a -r release-windows/tg_ws_proxy_windows.zip ./build/windows/x64/runner/Release/*

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release-windows/*


  # ==========================================
  # ۳. بیلد مکینتاش (macOS Build)
  # ==========================================
  build-macos:
    name: Build macOS App
    needs: build-android
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup macOS Environment & Entitlements
        run: |
          flutter config --enable-macos-desktop
          flutter create . --org com.example.tgwsproxy --project-name tg_ws_proxy --platforms macos
          
          # اعطای مجوزهای بومی مک به سرور پروکسی لوکال SOCKS5
          plutil -insert "com.apple.security.network.server" -bool true macos/Runner/Release.entitlements
          plutil -insert "com.apple.security.network.client" -bool true macos/Runner/Release.entitlements
          plutil -insert "com.apple.security.network.server" -bool true macos/Runner/DebugProfile.entitlements
          plutil -insert "com.apple.security.network.client" -bool true macos/Runner/DebugProfile.entitlements

      - name: Download Shared Source Code
        uses: actions/download-artifact@v4
        with:
          name: shared_source
          path: .

      - name: Extract Source and Build
        run: |
          tar -xvf shared_source.tar
          flutter pub get
          flutter build macos --release
          
          mkdir -p release-macos
          cd build/macos/Build/Products/Release/
          zip -r ../../../../release-macos/tg_ws_proxy_macOS.zip tg_ws_proxy.app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-macos/*


  # ==========================================
  # ۴. انتشار نهایی (Publish GitHub Release)
  # ==========================================
  publish-release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-release-packages
          pattern: release-*
          merge-multiple: true

      - name: Publish Production Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.0-build{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Release v1.0.0 (Build {0})', github.run_number) }}
          draft: false
          prerelease: false
          files: final-release-packages/*
