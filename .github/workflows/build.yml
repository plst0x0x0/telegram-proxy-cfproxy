name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build and Release Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Initialize Project & Inject Source Code
        run: |
          # ۱. ایجاد ساختار اولیه پروژه فلاتر در دایرکتوری جاری
          flutter create . --org com.example.tgwsproxy --project-name tg_ws_proxy --platforms android
          
          # ۲. تزریق دسترسی اینترنت به مانیفست اندروید (حیاتی برای عملکرد نسخه Release)
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/><application/' android/app/src/main/AndroidManifest.xml

          # ۳. ساخت فایل pubspec.yaml با وابستگی‌های تعریف شده
          cat <<'YAML' > pubspec.yaml
          name: tg_ws_proxy
          description: SOCKS5 Proxy Manager for Telegram via Cloudflare Workers
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.2.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            provider: ^6.1.2
            web_socket_channel: ^2.4.5
            url_launcher: ^6.3.0
            uuid: ^4.4.2
            shared_preferences: ^2.3.2

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          YAML

          # ۴. ایجاد دایرکتوری‌های فرعی معماری برنامه
          mkdir -p lib/{models,services,providers,screens,widgets}

          # ۵. نگارش مدل مدل Worker
          cat <<'DART' > lib/models/worker.dart
          class Worker {
            final String id;
            String url;
            int requestCount;
            final int maxRequests;
            int pingLatency;
            bool isOnline;

            Worker({required this.id, required this.url, this.requestCount = 0, this.maxRequests = 100000, this.pingLatency = -1, this.isOnline = false});

            factory Worker.fromJson(Map<String, dynamic> json) => Worker(
              id: json['id'], url: json['url'],
              requestCount: json['requestCount'] ?? 0,
              maxRequests: json['maxRequests'] ?? 100000,
              pingLatency: json['pingLatency'] ?? -1,
              isOnline: json['isOnline'] ?? false,
            );

            Map<String, dynamic> toJson() => {
              'id': id, 'url': url,
              'requestCount': requestCount, 'maxRequests': maxRequests,
              'pingLatency': pingLatency, 'isOnline': isOnline,
            };
          }
          DART

          # ۶. سرویس حافظه موقت سیستم
          cat <<'DART' > lib/services/clipboard_service.dart
          import 'package:flutter/services.dart';
          class ClipboardService {
            Future<String?> getClipboardData() async => (await Clipboard.getData('text/plain'))?.text;
            Future<void> setClipboardData(String text) async => Clipboard.setData(ClipboardData(text: text));
          }
          DART

          # ۷. سرویس ارزیابی تاخیر پینگ
          cat <<'DART' > lib/services/ping_service.dart
          import 'dart:async';
          import 'dart:io';
          class PingService {
            Future<int> ping(String url) async {
              try {
                final uri = Uri.parse(url);
                final host = uri.host;
                final port = uri.scheme == 'https' ? 443 : (uri.port != 0 ? uri.port : 80);
                final sw = Stopwatch()..start();
                final socket = await Socket.connect(host, port, timeout: const Duration(seconds: 6));
                socket.destroy();
                sw.stop();
                return sw.elapsedMilliseconds;
              } on TimeoutException {
                return -1;
              } catch (_) {
                return -1;
              }
            }
          }
          DART

          # ۸. سرویس فراخوانی اینتنت تلگرام
          cat <<'DART' > lib/services/telegram_service.dart
          import 'package:url_launcher/url_launcher.dart';
          class TelegramService {
            Future<bool> openTelegramProxySettings({required String server, required int port}) async {
              final uri = Uri.parse('tg://socks?server=$server&port=$port');
              if (await canLaunchUrl(uri)) return launchUrl(uri, mode: LaunchMode.externalApplication);
              return false;
            }
          }
          DART

          # ۹. هسته پردازشی سرور پروکسی لوکال SOCKS5
          cat <<'DART' > lib/services/socks5_proxy_server.dart
          import 'dart:async';
          import 'dart:io';
          import 'dart:typed_data';
          import 'package:web_socket_channel/web_socket_channel.dart';
          import '../models/worker.dart';

          class Socks5ProxyServer {
            ServerSocket? _server;
            bool _isRunning = false;
            String _status = 'Stopped';
            int _activeConnections = 0;
            String _bindHost = '127.0.0.1';
            int _bindPort = 1080;
            final StreamController<String> _statusController = StreamController<String>.broadcast();
            final StreamController<int> _connectionsController = StreamController<int>.broadcast();
            final StreamController<String> _debugLogController = StreamController<String>.broadcast();
            final List<Worker> _workers = [];
            Worker? _activeWorker;
            final List<StreamSubscription> _connectionSubscriptions = [];
            void Function(String logMsg)? onDebugLog;
            void Function(Worker worker)? onConnectionRelayed;

            bool get isRunning => _isRunning;
            String get status => _status;
            String get bindHost => _bindHost;
            int get bindPort => _bindPort;
            Stream<String> get statusStream => _statusController.stream;
            Stream<int> get connectionsStream => _connectionsController.stream;
            Stream<String> get debugLogStream => _debugLogController.stream;

            void setBindAddress(String host, int port) {
              _bindHost = host;
              _bindPort = port;
            }

            void setWorkers(List<Worker> workers) {
              _workers.clear();
              _workers.addAll(workers);
            }

            void setActiveWorker(Worker? worker) {
              _activeWorker = worker;
            }

            void _debug(String msg) {
              _debugLogController.add('[SOCKS5] $msg');
              onDebugLog?.call('[SOCKS5] $msg');
            }

            Future<void> start() async {
              if (_isRunning) return;
              if (_activeWorker == null && _workers.isNotEmpty) {
                _activeWorker = _workers.first;
              }
              if (_activeWorker == null) {
                _updateStatus('No active worker configured');
                return;
              }
              try {
                _server = await ServerSocket.bind(_bindHost, _bindPort);
                _isRunning = true;
                _updateStatus('Running (SOCKS5)');
                _debug('Server started on $_bindHost:$_bindPort');
                _server!.listen(_handleConnection);
              } catch (e) {
                _updateStatus('Error: $e');
                _debug('Failed to start server: $e');
              }
            }

            Future<void> stop() async {
              if (!_isRunning) return;
              _isRunning = false;
              await _server?.close();
              _server = null;
              _activeConnections = 0;
              _connectionsController.add(0);
              for (final sub in _connectionSubscriptions) {
                sub.cancel();
              }
              _connectionSubscriptions.clear();
              _debug('Server stopped');
              _updateStatus('Stopped');
            }

            void _handleConnection(Socket clientSocket) async {
              _activeConnections++;
              _connectionsController.add(_activeConnections);
              try {
                final dataController = StreamController<Uint8List>();
                final buffer = <int>[];

                final sub = clientSocket.listen(
                  (data) {
                    buffer.addAll(data);
                    dataController.add(data);
                  },
                  onError: (e) {
                    if (!dataController.isClosed) dataController.addError(e);
                  },
                  onDone: () {
                    if (!dataController.isClosed) dataController.close();
                  },
                );

                Future<Uint8List> readBytes(int n) async {
                  while (buffer.length < n) {
                    await dataController.stream.first;
                  }
                  final result = Uint8List.fromList(buffer.sublist(0, n));
                  buffer.removeRange(0, n);
                  return result;
                }

                final greeting = await readBytes(2);
                if (greeting[0] != 0x05) {
                  _debug('Invalid SOCKS5 version');
                  await sub.cancel();
                  clientSocket.destroy();
                  return;
                }
                final nmethods = greeting[1];
                final methods = await readBytes(nmethods);
                clientSocket.add(Uint8List.fromList([0x05, 0x00]));
                _debug('SOCKS5 greeting OK');

                final reqHeader = await readBytes(4);
                if (reqHeader[0] != 0x05 || reqHeader[1] != 0x01) {
                  _debug('Invalid SOCKS5 request');
                  await sub.cancel();
                  clientSocket.destroy();
                  return;
                }
                final addrType = reqHeader[3];
                Uint8List targetAddr;
                if (addrType == 0x01) {
                  targetAddr = await readBytes(6);
                } else if (addrType == 0x03) {
                  final lenBuf = await readBytes(1);
                  final domainLen = lenBuf[0];
                  final domain = await readBytes(domainLen);
                  final port = await readBytes(2);
                  targetAddr = Uint8List.fromList([addrType, domainLen, ...domain, ...port]);
                } else if (addrType == 0x04) {
                  targetAddr = await readBytes(18);
                } else {
                  _debug('Unsupported address type $addrType');
                  await sub.cancel();
                  clientSocket.destroy();
                  return;
                }
                _debug('SOCKS5 request for: ${_formatAddress(targetAddr)}');

                String workerUrl = _activeWorker!.url;
                if (workerUrl.startsWith('https://')) {
                  workerUrl = workerUrl.replaceFirst('https://', 'wss://');
                } else if (workerUrl.startsWith('http://')) {
                  workerUrl = workerUrl.replaceFirst('http://', 'ws://');
                }
                _debug('Connecting WebSocket to $workerUrl');

                sub.pause();

                final wsChannel = WebSocketChannel.connect(Uri.parse(workerUrl));
                await wsChannel.ready.timeout(const Duration(seconds: 10));
                _debug('WebSocket connected');

                clientSocket.add(Uint8List.fromList([0x05, 0x00, 0x00, ...targetAddr]));

                sub.resume();
                final wsSink = wsChannel.sink;
                final wsStream = wsChannel.stream;

                sub.onData((data) {
                  wsSink.add(data);
                });
                sub.onDone(() {
                  wsSink.close();
                });
                sub.onError((e) {
                  wsSink.close();
                });

                final wsToSocket = wsStream.listen(
                  (data) {
                    try {
                      clientSocket.add(data);
                    } catch (_) {}
                  },
                  onDone: () {
                    clientSocket.destroy();
                  },
                  onError: (e) {
                    clientSocket.destroy();
                  },
                  cancelOnError: true,
                );
                _connectionSubscriptions.add(sub);
                _connectionSubscriptions.add(wsToSocket);

                if (_activeWorker != null) {
                  _activeWorker!.requestCount++;
                  onConnectionRelayed?.call(_activeWorker!);
                }

                await Future.any([
                  sub.asFuture<void>(),
                  wsToSocket.asFuture<void>(),
                ]);
              } catch (e) {
                _debug('Connection error: $e');
                try {
                  clientSocket.add(Uint8List.fromList([0x05, 0x01, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]));
                } catch (_) {}
              } finally {
                _activeConnections--;
                _connectionsController.add(_activeConnections);
                try {
                  clientSocket.destroy();
                } catch (_) {}
              }
            }

            String _formatAddress(List<int> addr) {
              if (addr.isEmpty) return 'unknown';
              final type = addr[0];
              if (type == 0x01 && addr.length >= 7) {
                final ip = '${addr[1]}.${addr[2]}.${addr[3]}.${addr[4]}';
                final port = (addr[5] << 8) | addr[6];
                return '$ip:$port';
              } else if (type == 0x03 && addr.length >= 2) {
                final len = addr[1];
                if (addr.length >= 2 + len + 2) {
                  final domain = String.fromCharCodes(addr.sublist(2, 2 + len));
                  final port = (addr[2 + len] << 8) | addr[3 + len];
                  return '$domain:$port';
                }
              }
              return 'unknown';
            }

            void _updateStatus(String status) {
              _status = status;
              _statusController.add(status);
            }

            void dispose() {
              _statusController.close();
              _connectionsController.close();
              _debugLogController.close();
            }
          }
          DART

          # ۱۰. مدیریت وضعیت سراسری اپلیکیشن (State Management)
          cat <<'DART' > lib/providers/app_state.dart
          import 'dart:convert';
          import 'package:flutter/foundation.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'package:uuid/uuid.dart';
          import '../models/worker.dart';
          import '../services/clipboard_service.dart';
          import '../services/socks5_proxy_server.dart';
          import '../services/telegram_service.dart';
          import '../services/ping_service.dart';

          class AppState extends ChangeNotifier {
            final Socks5ProxyServer proxyServer;
            final ClipboardService clipboardService;
            final TelegramService telegramService;
            final PingService pingService;

            List<Worker> _workers = [];
            Worker? _selectedWorker;
            bool _proxyRunning = false;
            String _proxyStatus = 'Stopped';
            final List<String> _logs = [];
            int _activeConnections = 0;
            bool _autoSwitch = false;
            late SharedPreferences _prefs;

            AppState({required this.proxyServer, required this.clipboardService, required this.telegramService, required this.pingService}) {
              proxyServer.statusStream.listen((status) {
                _proxyStatus = status;
                _proxyRunning = proxyServer.isRunning;
                if (status.startsWith('Error')) _addLog('Error: $status');
                notifyListeners();
              });
              proxyServer.connectionsStream.listen((count) {
                _activeConnections = count;
                notifyListeners();
              });
              proxyServer.debugLogStream.listen((msg) {
                _addLog(msg);
              });
              proxyServer.onDebugLog = (msg) {
                _addLog(msg);
              };
              proxyServer.onConnectionRelayed = (worker) {
                if (_autoSwitch && worker == _selectedWorker && worker.requestCount >= worker.maxRequests) {
                  _switchToNextWorker();
                }
                notifyListeners();
              };
              _initPrefs();
            }

            List<Worker> get workers => _workers;
            Worker? get selectedWorker => _selectedWorker;
            bool get proxyRunning => _proxyRunning;
            String get proxyStatus => _proxyStatus;
            List<String> get logs => _logs;
            int get activeConnections => _activeConnections;
            bool get autoSwitch => _autoSwitch;
            String get bindHost => proxyServer.bindHost;
            int get bindPort => proxyServer.bindPort;

            Future<void> _initPrefs() async {
              _prefs = await SharedPreferences.getInstance();
              _loadSettings();
              _loadWorkers();
              notifyListeners();
              pingAll();
            }

            void _loadSettings() {
              final host = _prefs.getString('bindHost') ?? '127.0.0.1';
              final port = _prefs.getInt('bindPort') ?? 1080;
              proxyServer.setBindAddress(host, port);
              _autoSwitch = _prefs.getBool('autoSwitch') ?? false;
            }

            void _loadWorkers() {
              final jsonString = _prefs.getString('workers');
              if (jsonString != null) {
                final List<dynamic> list = json.decode(jsonString);
                _workers = list.map((e) => Worker.fromJson(e as Map<String, dynamic>)).toList();
                final selectedId = _prefs.getString('selectedWorkerId');
                if (selectedId != null) {
                  _selectedWorker = _workers.firstWhere((w) => w.id == selectedId, orElse: () => _workers.first);
                }
              }
            }

            Future<void> _saveWorkers() async {
              final jsonString = json.encode(_workers.map((w) => w.toJson()).toList());
              await _prefs.setString('workers', jsonString);
              if (_selectedWorker != null) await _prefs.setString('selectedWorkerId', _selectedWorker!.id);
            }

            void setBindAddress(String host, int port) {
              proxyServer.setBindAddress(host, port);
              _prefs.setString('bindHost', host);
              _prefs.setInt('bindPort', port);
              _addLog('Bind address changed to $host:$port');
              notifyListeners();
            }

            Future<void> setAutoSwitch(bool value) async {
              _autoSwitch = value;
              await _prefs.setBool('autoSwitch', value);
              _addLog('Auto-switch ${value ? "enabled" : "disabled"}');
              notifyListeners();
            }

            Future<void> importWorkerFromClipboard() async {
              final text = await clipboardService.getClipboardData();
              if (text != null && text.isNotEmpty) {
                final worker = Worker(id: const Uuid().v4(), url: text.trim());
                _workers.add(worker);
                _addLog('Imported worker');
                await _saveWorkers();
                notifyListeners();
                final latency = await pingService.ping(worker.url);
                worker.pingLatency = latency;
                worker.isOnline = latency != -1;
                await _saveWorkers();
                _addLog('${worker.url} -> ${worker.isOnline ? "${latency}ms" : "OFFLINE"}');
                notifyListeners();
              }
            }

            void selectWorker(Worker w) {
              _selectedWorker = w;
              _saveWorkers();
              _addLog('Selected ${w.url}');
              notifyListeners();
            }

            Future<void> removeWorker(Worker w) async {
              _workers.remove(w);
              if (_selectedWorker == w) {
                _selectedWorker = _workers.isNotEmpty ? _workers.first : null;
              }
              await _saveWorkers();
              _addLog('Removed ${w.url}');
              notifyListeners();
            }

            Future<void> copyWorkerUrl(Worker w) async {
              await clipboardService.setClipboardData(w.url);
              _addLog('Copied URL: ${w.url}');
              notifyListeners();
            }

            Future<void> copyAllWorkers() async {
              if (_workers.isEmpty) return;
              final all = _workers.map((w) => w.url).join('\n');
              await clipboardService.setClipboardData(all);
              _addLog('Copied all worker URLs');
              notifyListeners();
            }

            Future<void> copyLogs() async {
              if (_logs.isEmpty) return;
              final all = _logs.join('\n');
              await clipboardService.setClipboardData(all);
              _addLog('Logs copied to clipboard');
              notifyListeners();
            }

            Future<void> pingAll() async {
              _addLog('Pinging all workers...');
              for (var w in _workers) {
                final latency = await pingService.ping(w.url);
                w.pingLatency = latency;
                w.isOnline = latency != -1;
                _addLog('${w.url} -> ${w.isOnline ? "${latency}ms" : "OFFLINE"}');
              }
              await _saveWorkers();
              notifyListeners();
            }

            Future<void> toggleProxy() async {
              if (_proxyRunning) {
                await proxyServer.stop();
                _addLog('Proxy stopped');
              } else {
                proxyServer.setWorkers(_workers);
                proxyServer.setActiveWorker(_selectedWorker);
                await proxyServer.start();
                _addLog('Proxy started');
              }
              notifyListeners();
            }

            Future<void> openInTelegram() async {
              final ok = await telegramService.openTelegramProxySettings(server: bindHost, port: bindPort);
              _addLog(ok ? 'Opened Telegram' : 'Failed to open Telegram');
            }

            void clearLogs() {
              _logs.clear();
              notifyListeners();
            }

            void _addLog(String msg) {
              _logs.add('[${DateTime.now().toIso8601String()}] $msg');
              if (_logs.length > 200) _logs.removeAt(0);
              notifyListeners();
            }

            void _switchToNextWorker() {
              if (_workers.length < 2) return;
              final onlineWorkers = _workers.where((w) => w.isOnline).toList();
              if (onlineWorkers.isEmpty) return;
              int currentIdx = onlineWorkers.indexOf(_selectedWorker!);
              int nextIdx = (currentIdx + 1) % onlineWorkers.length;
              _selectedWorker = onlineWorkers[nextIdx];
              proxyServer.setActiveWorker(_selectedWorker);
              _addLog('Auto-switched to ${_selectedWorker!.url}');
              _saveWorkers();
              notifyListeners();
            }

            @override
            void dispose() {
              proxyServer.dispose();
              super.dispose();
            }
          }
          }
          DART

          # ۱۱. صفحه رابط کاربری اصلی (HomeScreen)
          cat <<'DART' > lib/screens/home_screen.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_state.dart';
          import '../models/worker.dart';
          import '../widgets/worker_tile.dart';
          import '../widgets/bottom_status_bar.dart';
          import 'log_screen.dart';

          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});
            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }
          class _HomeScreenState extends State<HomeScreen> {
            void _showSettings(BuildContext context) {
              final app = context.read<AppState>();
              final hostCtrl = TextEditingController(text: app.bindHost);
              final portCtrl = TextEditingController(text: app.bindPort.toString());
              bool autoSwitch = app.autoSwitch;
              showDialog(
                context: context,
                builder: (ctx) => StatefulBuilder(
                  builder: (ctx, setState) => AlertDialog(
                    title: const Text('Settings'),
                    content: Column(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        TextField(controller: hostCtrl, decoration: const InputDecoration(labelText: 'Bind IP')),
                        TextField(controller: portCtrl, decoration: const InputDecoration(labelText: 'Bind Port'), keyboardType: TextInputType.number),
                        SwitchListTile(title: const Text('Auto-switch on limit'), value: autoSwitch, onChanged: (val) { setState(() { autoSwitch = val; }); }),
                      ],
                    ),
                    actions: [
                      TextButton(onPressed: () => Navigator.pop(ctx), child: const Text('Cancel')),
                      TextButton(
                        onPressed: () {
                          final host = hostCtrl.text.trim();
                          final port = int.tryParse(portCtrl.text.trim());
                          if (host.isNotEmpty && port != null && port > 0) app.setBindAddress(host, port);
                          app.setAutoSwitch(autoSwitch);
                          Navigator.pop(ctx);
                        },
                        child: const Text('Save'),
                      ),
                    ],
                  ),
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              final app = context.watch<AppState>();
              return Scaffold(
                appBar: AppBar(
                  title: const Text('TG WS Proxy'),
                  centerTitle: true,
                  actions: [
                    PopupMenuButton<String>(
                      icon: const Icon(Icons.more_vert),
                      onSelected: (value) {
                        switch (value) {
                          case 'import': app.importWorkerFromClipboard(); break;
                          case 'copy_all': app.copyAllWorkers(); break;
                          case 'ping_all': app.pingAll(); break;
                          case 'logs': Navigator.push(context, MaterialPageRoute(builder: (_) => const LogScreen())); break;
                          case 'settings': _showSettings(context); break;
                        }
                      },
                      itemBuilder: (context) => [
                        const PopupMenuItem(value: 'import', child: ListTile(leading: Icon(Icons.content_paste), title: Text('Import worker by clipboard'))),
                        const PopupMenuItem(value: 'copy_all', child: ListTile(leading: Icon(Icons.copy_all), title: Text('Copy all workers'))),
                        const PopupMenuItem(value: 'ping_all', child: ListTile(leading: Icon(Icons.speed), title: Text('Ping all'))),
                        const PopupMenuItem(value: 'logs', child: ListTile(leading: Icon(Icons.terminal), title: Text('Logs'))),
                        const PopupMenuItem(value: 'settings', child: ListTile(leading: Icon(Icons.settings), title: Text('Settings'))),
                      ],
                    ),
                  ],
                ),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(16),
                      child: SizedBox(
                        width: double.infinity,
                        child: ElevatedButton.icon(
                          onPressed: app.proxyRunning ? () => app.openInTelegram() : null,
                          icon: const Icon(Icons.send),
                          label: const Text('Import Proxy to Telegram'),
                          style: ElevatedButton.styleFrom(padding: const EdgeInsets.symmetric(vertical: 16)),
                        ),
                      ),
                    ),
                    Expanded(
                      child: app.workers.isEmpty
                          ? const Center(child: Text('No workers imported.\nUse the menu to import.'))
                          : ListView.builder(
                              itemCount: app.workers.length,
                              itemBuilder: (_, i) {
                                final w = app.workers[i];
                                return WorkerTile(
                                  worker: w,
                                  isSelected: app.selectedWorker == w,
                                  onTap: () => app.selectWorker(w),
                                  onRemove: () => app.removeWorker(w),
                                  onCopy: () => app.copyWorkerUrl(w),
                                );
                              },
                            ),
                    ),
                  ],
                ),
                bottomNavigationBar: BottomStatusBar(
                  status: app.proxyStatus,
                  isRunning: app.proxyRunning,
                  activeConnections: app.activeConnections,
                  onToggle: app.toggleProxy,
                ),
              );
            }
          }
          DART

          # ۱۲. تکمیل پیاده سازی نهایی صفحه لاگ ترمینال (LogScreen)
          cat <<'DART' > lib/screens/log_screen.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_state.dart';
          class LogScreen extends StatelessWidget {
            const LogScreen({super.key});
            @override
            Widget build(BuildContext context) {
              final app = context.watch<AppState>();
              return Scaffold(
                appBar: AppBar(title: const Text('Logs'), actions: [
                  IconButton(icon: const Icon(Icons.copy), onPressed: () => app.copyLogs(), tooltip: 'Copy logs'),
                  IconButton(icon: const Icon(Icons.cleaning_services), onPressed: () => app.clearLogs(), tooltip: 'Clear Logs'),
                ]),
                body: app.logs.isEmpty
                    ? const Center(child: Text('No logs'))
                    : ListView.builder(
                        itemCount: app.logs.length,
                        itemBuilder: (_, i) => Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 12, vertical: 4),
                          child: Text(app.logs[i], style: const TextStyle(fontSize: 12, fontFamily: 'monospace')),
                        ),
                      ),
              );
            }
          }
          DART

          # ۱۳. ساخت ویجت اختصاصی لیست کارت‌ها (WorkerTile)
          cat <<'DART' > lib/widgets/worker_tile.dart
          import 'package:flutter/material.dart';
          import '../models/worker.dart';

          class WorkerTile extends StatelessWidget {
            final Worker worker;
            final bool isSelected;
            final VoidCallback onTap;
            final VoidCallback onRemove;
            final VoidCallback onCopy;

            const WorkerTile({
              super.key,
              required this.worker,
              required this.isSelected,
              required this.onTap,
              required this.onRemove,
              required this.onCopy,
            });

            @override
            Widget build(BuildContext context) {
              return Card(
                color: isSelected ? Theme.of(context).colorScheme.primaryContainer : null,
                margin: const EdgeInsets.symmetric(horizontal: 16, vertical: 6),
                child: ListTile(
                  onTap: onTap,
                  leading: Icon(
                    worker.isOnline ? Icons.dns : Icons.cloud_off,
                    color: worker.isOnline ? Colors.green : Colors.grey,
                  ),
                  title: Text(
                    worker.url,
                    maxLines: 1,
                    overflow: TextOverflow.ellipsis,
                    style: TextStyle(fontWeight: isSelected ? FontWeight.bold : FontWeight.normal),
                  ),
                  subtitle: Text(
                    worker.isOnline
                        ? 'Latency: ${worker.pingLatency}ms | Req: ${worker.requestCount}'
                        : 'Offline / Untested',
                    style: const TextStyle(fontSize: 12),
                  ),
                  trailing: Row(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      IconButton(icon: const Icon(Icons.copy, size: 20), onPressed: onCopy, tooltip: 'Copy URL'),
                      IconButton(icon: const Icon(Icons.delete, size: 20, color: Colors.red), onPressed: onRemove, tooltip: 'Remove'),
                    ],
                  ),
                ),
              );
            }
          }
          DART

          # ۱۴. ساخت ویجت کنترل وضعیت پایینی (BottomStatusBar)
          cat <<'DART' > lib/widgets/bottom_status_bar.dart
          import 'package:flutter/material.dart';

          class BottomStatusBar extends StatelessWidget {
            final String status;
            final bool isRunning;
            final int activeConnections;
            final VoidCallback onToggle;

            const BottomStatusBar({
              super.key,
              required this.status,
              required this.isRunning,
              required this.activeConnections,
              required this.onToggle,
            });

            @override
            Widget build(BuildContext context) {
              return Container(
                padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 12),
                decoration: BoxDecoration(
                  color: Theme.of(context).colorScheme.surfaceContainerHighest,
                  border: Border(top: BorderSide(color: Theme.of(context).dividerColor)),
                ),
                child: SafeArea(
                  child: Row(
                    children: [
                      Expanded(
                        child: Column(
                          mainAxisSize: MainAxisSize.min,
                          crossAxisAlignment: CrossAxisAlignment.start,
                          children: [
                            Row(
                              children: [
                                Container(
                                  width: 10,
                                  height: 10,
                                  decoration: BoxDecoration(shape: BoxShape.circle, color: isRunning ? Colors.green : Colors.red),
                                ),
                                const SizedBox(width: 8),
                                Text(status, style: const TextStyle(fontWeight: FontWeight.bold)),
                              ],
                            ),
                            const SizedBox(height: 4),
                            Text('Active Connections: $activeConnections', style: TextStyle(fontSize: 12, color: Theme.of(context).colorScheme.onSurfaceVariant)),
                          ],
                        ),
                      ),
                      ElevatedButton.icon(
                        onPressed: onToggle,
                        icon: Icon(isRunning ? Icons.stop : Icons.play_arrow),
                        label: Text(isRunning ? 'Stop Server' : 'Start Server'),
                        style: ElevatedButton.styleFrom(
                          backgroundColor: isRunning ? Colors.red.shade100 : Colors.green.shade100,
                          foregroundColor: isRunning ? Colors.red.shade900 : Colors.green.shade900,
                        ),
                      ),
                    ],
                  ),
                ),
              );
            }
          }
          DART

          # ۱۵. ساخت فایل ورود اصلی برنامه (main.dart)
          cat <<'DART' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'providers/app_state.dart';
          import 'services/socks5_proxy_server.dart';
          import 'services/clipboard_service.dart';
          import 'services/telegram_service.dart';
          import 'services/ping_service.dart';
          import 'screens/home_screen.dart';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            final proxyServer = Socks5ProxyServer();
            final clipboardService = ClipboardService();
            final telegramService = TelegramService();
            final pingService = PingService();

            runApp(
              ChangeNotifierProvider(
                create: (_) => AppState(
                  proxyServer: proxyServer,
                  clipboardService: clipboardService,
                  telegramService: telegramService,
                  pingService: pingService,
                ),
                child: const MyApp(),
              ),
            );
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'TG WS Proxy',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue, brightness: Brightness.light), useMaterialDesign: true),
                darkTheme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: Colors.blue, brightness: Brightness.dark), useMaterialDesign: true),
                themeMode: ThemeMode.system,
                home: const HomeScreen(),
              );
            }
          }
          DART

      - name: Build Android Deployment Artifacts
        run: |
          # تولید نسخه یونیورسال فونداسیون (شامل تمام معماری‌ها در یک فایل)
          flutter build apk --release
          
          # تولید نسخه‌های تفکیک شده براساس معماری پردازنده (Split-per-ABI) برای کاهش حجم دانلود کاربر
          flutter build apk --release --split-per-abi
          
          # تولید بسته نهایی باندل گوگل‌پلی
          flutter build appbundle --release

      - name: Organize Deployment Assets
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/tg_ws_proxy_universal.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk release-artifacts/tg_ws_proxy_armeabi-v7a.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk release-artifacts/tg_ws_proxy_arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk release-artifacts/tg_ws_proxy_x86_64.apk
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/tg_ws_proxy.aab

      - name: Automatic GitHub Release Generation
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v1.0.0-build{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build v1.0.0-build{0}', github.run_number) }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
            release-artifacts/*.aab
