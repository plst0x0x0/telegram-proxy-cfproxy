name: Build & Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─────────── Setup project source code ───────────
  setup-project:
    runs-on: ubuntu-latest
    outputs:
      project-path: ${{ steps.create.outputs.path }}
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create project and write all Dart source files
        id: create
        run: |
          flutter create tg_ws_proxy --org com.example --platforms android,linux,macos,windows
          cd tg_ws_proxy

          # pubspec.yaml
          cat <<'YAML' > pubspec.yaml
          name: tg_ws_proxy
          description: SOCKS5 Proxy Manager for Telegram via Cloudflare Workers
          publish_to: 'none'
          version: 1.0.0

          environment:
            sdk: '>=3.2.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            provider: ^6.1.2
            web_socket_channel: ^2.4.5
            url_launcher: ^6.3.0
            uuid: ^4.4.2

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          YAML

          mkdir -p lib/{models,services,providers,screens,widgets}

          # ---------- models/worker.dart ----------
          cat <<'DART' > lib/models/worker.dart
          class Worker {
            final String id;
            final String url;
            int requestCount;
            final int maxRequests;
            int pingLatency;
            bool isOnline;
            Worker({required this.id, required this.url, this.requestCount = 0, this.maxRequests = 100000, this.pingLatency = -1, this.isOnline = false});
          }
          DART

          # ---------- services/clipboard_service.dart ----------
          cat <<'DART' > lib/services/clipboard_service.dart
          import 'package:flutter/services.dart';
          class ClipboardService {
            Future<String?> getClipboardData() async {
              final data = await Clipboard.getData('text/plain');
              return data?.text;
            }
            Future<void> setClipboardData(String text) async {
              await Clipboard.setData(ClipboardData(text: text));
            }
          }
          DART

          # ---------- services/ping_service.dart ----------
          cat <<'DART' > lib/services/ping_service.dart
          import 'dart:async';
          import 'dart:io';
          class PingService {
            Future<int> ping(String url) async {
              try {
                final uri = Uri.parse(url);
                final host = uri.host;
                final port = uri.scheme == 'https' ? 443 : (uri.port != 0 ? uri.port : 80);
                final sw = Stopwatch()..start();
                final socket = await Socket.connect(host, port, timeout: const Duration(seconds: 6));
                socket.destroy();
                sw.stop();
                return sw.elapsedMilliseconds;
              } on TimeoutException {
                return -1;
              } catch (_) {
                return -1;
              }
            }
          }
          DART

          # ---------- services/telegram_service.dart ----------
          cat <<'DART' > lib/services/telegram_service.dart
          import 'package:url_launcher/url_launcher.dart';
          class TelegramService {
            Future<bool> openTelegramProxySettings({required String server, required int port}) async {
              final uri = Uri.parse('tg://socks?server=$server&port=$port');
              if (await canLaunchUrl(uri)) {
                return launchUrl(uri, mode: LaunchMode.externalApplication);
              }
              return false;
            }
          }
          DART

          # ---------- services/socks5_proxy_server.dart (FIXED) ----------
          cat <<'DART' > lib/services/socks5_proxy_server.dart
          import 'dart:async';
          import 'dart:io';
          import 'dart:typed_data';
          import 'package:web_socket_channel/web_socket_channel.dart';
          import '../models/worker.dart';

          class Socks5ProxyServer {
            ServerSocket? _server;
            bool _isRunning = false;
            String _status = 'Stopped';
            int _activeConnections = 0;
            String _bindHost = '127.0.0.1';
            int _bindPort = 1080;
            final StreamController<String> _statusController = StreamController<String>.broadcast();
            final StreamController<int> _connectionsController = StreamController<int>.broadcast();
            final List<Worker> _workers = [];
            Worker? _activeWorker;
            final List<StreamSubscription> _connectionSubscriptions = [];

            bool get isRunning => _isRunning;
            String get status => _status;
            String get bindHost => _bindHost;
            int get bindPort => _bindPort;
            Stream<String> get statusStream => _statusController.stream;
            Stream<int> get connectionsStream => _connectionsController.stream;

            void setBindAddress(String host, int port) {
              _bindHost = host;
              _bindPort = port;
            }

            void setWorkers(List<Worker> workers) {
              _workers.clear();
              _workers.addAll(workers);
            }
            void setActiveWorker(Worker? worker) { _activeWorker = worker; }

            Future<void> start() async {
              if (_isRunning) return;
              if (_activeWorker == null && _workers.isNotEmpty) _activeWorker = _workers.first;
              if (_activeWorker == null) {
                _updateStatus('No active worker configured');
                return;
              }
              try {
                _server = await ServerSocket.bind(_bindHost, _bindPort);
                _isRunning = true;
                _updateStatus('Running (SOCKS5)');
                _server!.listen(_handleConnection);
              } catch (e) {
                _updateStatus('Error: $e');
              }
            }

            Future<void> stop() async {
              if (!_isRunning) return;
              _isRunning = false;
              await _server?.close();
              _server = null;
              _activeConnections = 0;
              _connectionsController.add(0);
              for (final sub in _connectionSubscriptions) sub.cancel();
              _connectionSubscriptions.clear();
              _updateStatus('Stopped');
            }

            void _handleConnection(Socket clientSocket) async {
              _activeConnections++;
              _connectionsController.add(_activeConnections);
              try {
                // ----- SOCKS5 greeting -----
                final greeting = await clientSocket.first;
                if (greeting.length < 3 || greeting[0] != 0x05) { clientSocket.destroy(); return; }
                clientSocket.add(Uint8List.fromList([0x05, 0x00]));

                // ----- SOCKS5 request -----
                final request = await clientSocket.first;
                if (request.length < 10 || request[0] != 0x05 || request[1] != 0x01) { clientSocket.destroy(); return; }
                final targetAddr = request.sublist(3); // keep full address + port

                // ----- Establish WebSocket to worker FIRST -----
                final wsChannel = WebSocketChannel.connect(Uri.parse(_activeWorker!.url));
                await wsChannel.ready;

                // ----- Reply success with the original target address/port -----
                clientSocket.add(Uint8List.fromList([0x05, 0x00, 0x00] + targetAddr));

                // ----- Bidirectional relay -----
                final wsSink = wsChannel.sink;
                final wsStream = wsChannel.stream;
                final socketToWs = clientSocket.listen(
                  (data) { wsSink.add(data); },
                  onDone: () { wsSink.close(); },
                  onError: (e) { wsSink.close(); },
                  cancelOnError: true,
                );
                final wsToSocket = wsStream.listen(
                  (data) { try { clientSocket.add(data); } catch (_) {} },
                  onDone: () { clientSocket.destroy(); },
                  onError: (e) { clientSocket.destroy(); },
                  cancelOnError: true,
                );
                _connectionSubscriptions.add(socketToWs);
                _connectionSubscriptions.add(wsToSocket);
                await Future.any([socketToWs.asFuture<void>(), wsToSocket.asFuture<void>()]);
              } catch (e) {
                try {
                  clientSocket.add(Uint8List.fromList([0x05, 0x01, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]));
                } catch (_) {}
              } finally {
                _activeConnections--;
                _connectionsController.add(_activeConnections);
                try { clientSocket.destroy(); } catch (_) {}
              }
            }

            void _updateStatus(String status) {
              _status = status;
              _statusController.add(status);
            }

            void dispose() {
              _statusController.close();
              _connectionsController.close();
            }
          }
          DART

          # ---------- providers/app_state.dart ----------
          cat <<'DART' > lib/providers/app_state.dart
          import 'package:flutter/foundation.dart';
          import 'package:uuid/uuid.dart';
          import '../models/worker.dart';
          import '../services/clipboard_service.dart';
          import '../services/socks5_proxy_server.dart';
          import '../services/telegram_service.dart';
          import '../services/ping_service.dart';

          class AppState extends ChangeNotifier {
            final Socks5ProxyServer proxyServer;
            final ClipboardService clipboardService;
            final TelegramService telegramService;
            final PingService pingService;
            List<Worker> _workers = [];
            Worker? _selectedWorker;
            bool _proxyRunning = false;
            String _proxyStatus = 'Stopped';
            final List<String> _logs = [];
            int _activeConnections = 0;

            AppState({required this.proxyServer, required this.clipboardService, required this.telegramService, required this.pingService}) {
              proxyServer.statusStream.listen((status) {
                _proxyStatus = status;
                _proxyRunning = proxyServer.isRunning;
                if (status.startsWith('Error')) _addLog('Error: $status');
                notifyListeners();
              });
              proxyServer.connectionsStream.listen((count) {
                _activeConnections = count;
                notifyListeners();
              });
            }

            List<Worker> get workers => _workers;
            Worker? get selectedWorker => _selectedWorker;
            bool get proxyRunning => _proxyRunning;
            String get proxyStatus => _proxyStatus;
            List<String> get logs => _logs;
            int get activeConnections => _activeConnections;
            String get bindHost => proxyServer.bindHost;
            int get bindPort => proxyServer.bindPort;

            void setBindAddress(String host, int port) {
              proxyServer.setBindAddress(host, port);
              _addLog('Bind address changed to $host:$port');
              notifyListeners();
            }

            Future<void> importWorkerFromClipboard() async {
              final text = await clipboardService.getClipboardData();
              if (text != null && text.isNotEmpty) {
                final worker = Worker(id: const Uuid().v4(), url: text.trim());
                _workers.add(worker);
                _addLog('Imported worker');
                notifyListeners();
                final latency = await pingService.ping(worker.url);
                worker.pingLatency = latency;
                worker.isOnline = latency != -1;
                _addLog('${worker.url} -> ${worker.isOnline ? "${latency}ms" : "OFFLINE"}');
                notifyListeners();
              }
            }
            void selectWorker(Worker w) { _selectedWorker = w; _addLog('Selected ${w.url}'); notifyListeners(); }
            void removeWorker(Worker w) { _workers.remove(w); if (_selectedWorker == w) _selectedWorker = null; _addLog('Removed ${w.url}'); notifyListeners(); }
            Future<void> copyWorkerUrl(Worker w) async { await clipboardService.setClipboardData(w.url); _addLog('Copied URL: ${w.url}'); notifyListeners(); }
            Future<void> copyAllWorkers() async { if (_workers.isEmpty) return; final all = _workers.map((w) => w.url).join('\n'); await clipboardService.setClipboardData(all); _addLog('Copied all worker URLs'); notifyListeners(); }
            Future<void> pingAll() async {
              _addLog('Pinging all workers...');
              for (var w in _workers) {
                final latency = await pingService.ping(w.url);
                w.pingLatency = latency;
                w.isOnline = latency != -1;
                _addLog('${w.url} -> ${w.isOnline ? "${latency}ms" : "OFFLINE"}');
              }
              notifyListeners();
            }
            Future<void> toggleProxy() async {
              if (_proxyRunning) {
                await proxyServer.stop();
                _addLog('Proxy stopped');
              } else {
                proxyServer.setWorkers(_workers);
                proxyServer.setActiveWorker(_selectedWorker);
                await proxyServer.start();
                _addLog('Proxy started');
              }
              notifyListeners();
            }
            Future<void> openInTelegram() async {
              final ok = await telegramService.openTelegramProxySettings(server: bindHost, port: bindPort);
              _addLog(ok ? 'Opened Telegram' : 'Failed to open Telegram');
            }
            void clearLogs() { _logs.clear(); notifyListeners(); }
            void _addLog(String msg) { _logs.add('[${DateTime.now().toIso8601String()}] $msg'); if (_logs.length > 100) _logs.removeAt(0); notifyListeners(); }
            @override
            void dispose() { proxyServer.dispose(); super.dispose(); }
          }
          DART

          # ---------- screens/home_screen.dart (unchanged) ----------
          cat <<'DART' > lib/screens/home_screen.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_state.dart';
          import '../models/worker.dart';
          import '../widgets/worker_tile.dart';
          import '../widgets/bottom_status_bar.dart';
          import 'log_screen.dart';

          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});
            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }
          class _HomeScreenState extends State<HomeScreen> {
            void _showSettings(BuildContext context) {
              final app = context.read<AppState>();
              final hostCtrl = TextEditingController(text: app.bindHost);
              final portCtrl = TextEditingController(text: app.bindPort.toString());
              showDialog(
                context: context,
                builder: (ctx) => AlertDialog(
                  title: const Text('Settings'),
                  content: Column(
                    mainAxisSize: MainAxisSize.min,
                    children: [
                      TextField(controller: hostCtrl, decoration: const InputDecoration(labelText: 'Bind IP')),
                      TextField(controller: portCtrl, decoration: const InputDecoration(labelText: 'Bind Port'), keyboardType: TextInputType.number),
                    ],
                  ),
                  actions: [
                    TextButton(onPressed: () => Navigator.pop(ctx), child: const Text('Cancel')),
                    TextButton(
                      onPressed: () {
                        final host = hostCtrl.text.trim();
                        final port = int.tryParse(portCtrl.text.trim());
                        if (host.isNotEmpty && port != null && port > 0) {
                          app.setBindAddress(host, port);
                          Navigator.pop(ctx);
                        }
                      },
                      child: const Text('Save'),
                    ),
                  ],
                ),
              );
            }

            @override
            Widget build(BuildContext context) {
              final app = context.watch<AppState>();
              return Scaffold(
                appBar: AppBar(
                  title: const Text('TG WS Proxy'),
                  centerTitle: true,
                  actions: [
                    PopupMenuButton<String>(
                      icon: const Icon(Icons.more_vert),
                      onSelected: (value) {
                        switch (value) {
                          case 'import': app.importWorkerFromClipboard(); break;
                          case 'copy_all': app.copyAllWorkers(); break;
                          case 'ping_all': app.pingAll(); break;
                          case 'logs': Navigator.push(context, MaterialPageRoute(builder: (_) => const LogScreen())); break;
                          case 'settings': _showSettings(context); break;
                        }
                      },
                      itemBuilder: (context) => [
                        const PopupMenuItem(value: 'import', child: ListTile(leading: Icon(Icons.content_paste), title: Text('Import worker by clipboard'))),
                        const PopupMenuItem(value: 'copy_all', child: ListTile(leading: Icon(Icons.copy_all), title: Text('Copy all workers'))),
                        const PopupMenuItem(value: 'ping_all', child: ListTile(leading: Icon(Icons.speed), title: Text('Ping all'))),
                        const PopupMenuItem(value: 'logs', child: ListTile(leading: Icon(Icons.terminal), title: Text('Logs'))),
                        const PopupMenuItem(value: 'settings', child: ListTile(leading: Icon(Icons.settings), title: Text('Settings'))),
                      ],
                    ),
                  ],
                ),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(16),
                      child: SizedBox(
                        width: double.infinity,
                        child: ElevatedButton.icon(
                          onPressed: app.proxyRunning ? () => app.openInTelegram() : null,
                          icon: const Icon(Icons.send),
                          label: const Text('Import Proxy to Telegram'),
                          style: ElevatedButton.styleFrom(padding: const EdgeInsets.symmetric(vertical: 16)),
                        ),
                      ),
                    ),
                    Expanded(
                      child: app.workers.isEmpty
                          ? const Center(child: Text('No workers imported.\nUse the menu to import.'))
                          : ListView.builder(
                              itemCount: app.workers.length,
                              itemBuilder: (_, i) {
                                final w = app.workers[i];
                                return WorkerTile(
                                  worker: w,
                                  isSelected: app.selectedWorker == w,
                                  onTap: () => app.selectWorker(w),
                                  onRemove: () => app.removeWorker(w),
                                  onCopy: () => app.copyWorkerUrl(w),
                                );
                              },
                            ),
                    ),
                  ],
                ),
                bottomNavigationBar: BottomStatusBar(
                  status: app.proxyStatus,
                  isRunning: app.proxyRunning,
                  activeConnections: app.activeConnections,
                  onToggle: app.toggleProxy,
                ),
              );
            }
          }
          DART

          # ---------- screens/log_screen.dart ----------
          cat <<'DART' > lib/screens/log_screen.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import '../providers/app_state.dart';
          class LogScreen extends StatelessWidget {
            const LogScreen({super.key});
            @override
            Widget build(BuildContext context) {
              final app = context.watch<AppState>();
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Logs'),
                  actions: [IconButton(icon: const Icon(Icons.cleaning_services), onPressed: () => app.clearLogs(), tooltip: 'Clear Logs')],
                ),
                body: app.logs.isEmpty
                    ? const Center(child: Text('No logs'))
                    : ListView.builder(
                        itemCount: app.logs.length,
                        itemBuilder: (_, i) => Text(app.logs[i], style: const TextStyle(fontSize: 12, fontFamily: 'monospace')),
                      ),
              );
            }
          }
          DART

          # ---------- widgets/worker_tile.dart ----------
          cat <<'DART' > lib/widgets/worker_tile.dart
          import 'package:flutter/material.dart';
          import '../models/worker.dart';
          class WorkerTile extends StatelessWidget {
            final Worker worker; final bool isSelected; final VoidCallback onTap; final VoidCallback onRemove; final VoidCallback onCopy;
            const WorkerTile({super.key, required this.worker, required this.isSelected, required this.onTap, required this.onRemove, required this.onCopy});
            @override
            Widget build(BuildContext context) {
              final pingText = worker.isOnline ? '${worker.pingLatency} ms' : '-1 ms (inactive)';
              final pingColor = worker.isOnline ? Colors.green : Colors.red;
              return Card(
                color: isSelected ? Colors.blue.withOpacity(0.2) : null,
                child: ListTile(
                  title: Text(worker.url, overflow: TextOverflow.ellipsis),
                  subtitle: Row(children: [
                    Text('Requests: ${worker.requestCount}/${worker.maxRequests}', style: const TextStyle(fontSize: 12)),
                    const SizedBox(width: 12),
                    Text('Ping: $pingText', style: TextStyle(fontSize: 12, color: pingColor)),
                  ]),
                  trailing: Row(mainAxisSize: MainAxisSize.min, children: [
                    IconButton(icon: const Icon(Icons.copy, size: 20), onPressed: onCopy, tooltip: 'Copy URL'),
                    IconButton(icon: const Icon(Icons.close, size: 20, color: Colors.red), onPressed: onRemove, tooltip: 'Remove worker'),
                  ]),
                  onTap: onTap,
                ),
              );
            }
          }
          DART

          # ---------- widgets/bottom_status_bar.dart ----------
          cat <<'DART' > lib/widgets/bottom_status_bar.dart
          import 'package:flutter/material.dart';
          class BottomStatusBar extends StatelessWidget {
            final String status; final bool isRunning; final int activeConnections; final VoidCallback onToggle;
            const BottomStatusBar({super.key, required this.status, required this.isRunning, required this.activeConnections, required this.onToggle});
            @override
            Widget build(BuildContext context) => Container(
              padding: const EdgeInsets.symmetric(horizontal: 16, vertical: 8),
              decoration: BoxDecoration(color: Theme.of(context).colorScheme.surfaceContainerHighest, border: Border(top: BorderSide(color: Theme.of(context).dividerColor))),
              child: Row(children: [
                Icon(isRunning ? Icons.check_circle : Icons.error, color: isRunning ? Colors.green : Colors.red, size: 20),
                const SizedBox(width: 8),
                Expanded(child: Text('$status (${activeConnections} connections)', style: TextStyle(fontSize: 12, color: Theme.of(context).colorScheme.onSurfaceVariant))),
                IconButton(onPressed: onToggle, icon: Icon(isRunning ? Icons.pause : Icons.play_arrow, color: isRunning ? Colors.orange : Colors.green), tooltip: isRunning ? 'Stop Proxy' : 'Start Proxy'),
              ]),
            );
          }
          DART

          # ---------- main.dart ----------
          cat <<'DART' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:provider/provider.dart';
          import 'providers/app_state.dart';
          import 'screens/home_screen.dart';
          import 'services/clipboard_service.dart';
          import 'services/socks5_proxy_server.dart';
          import 'services/telegram_service.dart';
          import 'services/ping_service.dart';

          void main() {
            runApp(MultiProvider(providers: [
              Provider<ClipboardService>(create: (_) => ClipboardService()),
              Provider<TelegramService>(create: (_) => TelegramService()),
              Provider<PingService>(create: (_) => PingService()),
              Provider<Socks5ProxyServer>(create: (_) => Socks5ProxyServer()),
              ChangeNotifierProvider<AppState>(create: (ctx) => AppState(
                proxyServer: ctx.read<Socks5ProxyServer>(),
                clipboardService: ctx.read<ClipboardService>(),
                telegramService: ctx.read<TelegramService>(),
                pingService: ctx.read<PingService>(),
              )),
            ], child: const MyApp()));
          }
          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) => MaterialApp(
              title: 'TG WS Proxy', debugShowCheckedModeBanner: false,
              theme: ThemeData(colorSchemeSeed: Colors.blue, useMaterial3: true, brightness: Brightness.dark),
              home: const HomeScreen(),
            );
          }
          DART

          # macOS Info.plist
          cat <<'PLIST' > macos/Runner/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleDevelopmentRegion</key><string>$(DEVELOPMENT_LANGUAGE)</string>
            <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
            <key>CFBundleIdentifier</key><string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>TG WS Proxy</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundleVersion</key><string>100</string>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
            <key>NSAppTransportSecurity</key><dict><key>NSAllowsLocalNetworking</key><true/></dict>
          </dict></plist>
          PLIST

          # macOS entitlements
          cat <<'ENTITLEMENTS' > macos/Runner/Release.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.app-sandbox</key>
          	<true/>
          	<key>com.apple.security.network.client</key>
          	<true/>
          	<key>com.apple.security.network.server</key>
          	<true/>
          </dict>
          </plist>
          ENTITLEMENTS
          cp macos/Runner/Release.entitlements macos/Runner/DebugProfile.entitlements

          # ---------- Size optimizations ----------
          # Android: enable ProGuard
          sed -i 's/minifyEnabled false/minifyEnabled true/' android/app/build.gradle
          sed -i '/minifyEnabled true/a\            shrinkResources true' android/app/build.gradle
          sed -i '/defaultConfig {/a\        ndk { abiFilters "armeabi-v7a","arm64-v8a","x86_64" }' android/app/build.gradle  # optional, but helps

          cd ..
          echo "path=$(pwd)/tg_ws_proxy" >> $GITHUB_OUTPUT

      - name: Upload project source
        uses: actions/upload-artifact@v4
        with:
          name: project-source
          path: tg_ws_proxy/

  # ─────────── Android ───────────
  build-android:
    needs: setup-project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true
      - name: Download project source
        uses: actions/download-artifact@v4
        with:
          name: project-source
          path: tg_ws_proxy
      - name: Build APK (ProGuard applied)
        working-directory: tg_ws_proxy
        run: |
          flutter pub get
          flutter build apk --release --shrink
          mkdir -p ../release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk ../release-artifacts/tg_ws_proxy_1.0.0_android_universal.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/

  # ─────────── Linux ───────────
  build-linux:
    needs: setup-project
    runs-on: ubuntu-latest
    steps:
      - name: Install ALL required Linux libraries for Flutter desktop
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libblkid-dev \
            libglu1-mesa-dev libpulse-dev \
            libasound2-dev libavformat-dev libavcodec-dev libavutil-dev \
            libavfilter-dev libavdevice-dev libx11-dev libxext-dev \
            libxrandr-dev libxi-dev libxcomposite-dev libxcursor-dev \
            libxdamage-dev libxrender-dev libxtst-dev \
            libepoxy-dev libpng-dev libharfbuzz-dev \
            libfontconfig1-dev libfreetype6-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Download project source
        uses: actions/download-artifact@v4
        with:
          name: project-source
          path: tg_ws_proxy
      - name: Build Linux (optimized)
        working-directory: tg_ws_proxy
        run: |
          flutter pub get
          flutter build linux --release
          mkdir -p ../release-artifacts
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../release-artifacts/tg_ws_proxy_1.0.0_linux_universal.tar.gz .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: release-artifacts/

  # ─────────── macOS ───────────
  build-macos:
    needs: setup-project
    runs-on: macos-latest
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Download project source
        uses: actions/download-artifact@v4
        with:
          name: project-source
          path: tg_ws_proxy
      - name: Build macOS and create DMG (maximum compression)
        working-directory: tg_ws_proxy
        run: |
          flutter pub get
          flutter build macos --release
          APP_PATH="build/macos/Build/Products/Release/tg_ws_proxy.app"
          DMG_NAME="tg_ws_proxy_1.0.0_macos_universal.dmg"
          mkdir dmg_mount
          cp -R "$APP_PATH" dmg_mount/
          ln -s /Applications dmg_mount/Applications
          hdiutil create -volname "TG WS Proxy" -srcfolder dmg_mount -ov -format UDZO -imagekey zlib-level=9 temp.dmg
          hdiutil convert temp.dmg -format UDZO -o "$DMG_NAME"
          rm -rf dmg_mount temp.dmg
          mkdir -p ../release-artifacts
          mv "$DMG_NAME" ../release-artifacts/
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release-artifacts/

  # ─────────── Windows ───────────
  build-windows:
    needs: setup-project
    runs-on: windows-latest
    steps:
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Download project source
        uses: actions/download-artifact@v4
        with:
          name: project-source
          path: tg_ws_proxy
      - name: Build Windows and create ZIP (maximum compression)
        working-directory: tg_ws_proxy
        shell: pwsh
        run: |
          flutter pub get
          flutter build windows --release
          $zip = "tg_ws_proxy_1.0.0_windows_universal.zip"
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "..\$zip" -CompressionLevel Optimal
          New-Item -ItemType Directory -Path ..\release-artifacts -Force
          Move-Item -Path "..\$zip" -Destination ..\release-artifacts\
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release-artifacts/

  # ─────────── 🚀 CREATE GITHUB RELEASE AUTOMATICALLY ───────────
  github-release:
    needs: [build-android, build-linux, build-macos, build-windows]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all available artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List files for release
        run: ls -R release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/*.apk
            release-artifacts/*.tar.gz
            release-artifacts/*.dmg
            release-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
